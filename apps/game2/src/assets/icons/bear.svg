<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 可爱小熊图标 - 儿童友好设计 -->
  <style>
    .bear-body { fill: #8B4513; stroke: #654321; stroke-width: 2; }
    .bear-face { fill: #D2691E; }
    .bear-ear { fill: #A0522D; }
    .bear-eye { fill: #000000; }
    .bear-nose { fill: #000000; }
    .bear-mouth { fill: none; stroke: #000000; stroke-width: 1.5; }
    .bear-belly { fill: #DEB887; }
    
    /* 简单的hover效果 */
    .bear-body:hover { fill: #A0522D; }
    .bear-belly:hover { fill: #F5DEB3; }
  </style>
  
  <!-- 身体 -->
  <circle class="bear-body" cx="50" cy="60" r="30"/>
  
  <!-- 肚子 -->
  <ellipse class="bear-belly" cx="50" cy="65" rx="15" ry="12"/>
  
  <!-- 头部 -->
  <circle class="bear-face" cx="50" cy="35" r="20"/>
  
  <!-- 耳朵 -->
  <circle class="bear-ear" cx="40" cy="20" r="8"/>
  <circle class="bear-ear" cx="60" cy="20" r="8"/>
  
  <!-- 眼睛 -->
  <circle class="bear-eye" cx="45" cy="30" r="3"/>
  <circle class="bear-eye" cx="55" cy="30" r="3"/>
  
  <!-- 鼻子 -->
  <ellipse class="bear-nose" cx="50" cy="38" rx="4" ry="3"/>
  
  <!-- 嘴巴 -->
  <path class="bear-mouth" d="M 48 42 Q 50 45 52 42" />
  
  <!-- 简单的装饰 -->
  <circle cx="35" cy="55" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="65" cy="55" r="2" fill="#FFD700" opacity="0.8"/>
  
  <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#654321">
    小熊
  </text>
</svg>