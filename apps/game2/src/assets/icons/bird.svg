<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 可爱小鸟图标 - 儿童友好设计 -->
  <style>
    .bird-body { fill: #FF6B6B; stroke: #D32F2F; stroke-width: 2; }
    .bird-wing { fill: #FF8A80; }
    .bird-beak { fill: #FFD54F; }
    .bird-eye { fill: #000000; }
    .bird-eye-white { fill: #FFFFFF; }
    .bird-leg { fill: #795548; stroke: #5D4037; stroke-width: 1.5; }
    
    /* 简单的hover效果 */
    .bird-body:hover { fill: #FF5252; }
    .bird-wing:hover { fill: #FF5252; }
  </style>
  
  <!-- 身体 -->
  <ellipse class="bird-body" cx="50" cy="50" rx="25" ry="20"/>
  
  <!-- 翅膀 -->
  <ellipse class="bird-wing" cx="40" cy="55" rx="15" ry="10" transform="rotate(-20 40 55)"/>
  
  <!-- 头部 -->
  <circle cx="70" cy="40" r="15" fill="#FF6B6B" stroke="#D32F2F" stroke-width="2"/>
  
  <!-- 眼睛 -->
  <circle class="bird-eye-white" cx="75" cy="38" r="4"/>
  <circle class="bird-eye" cx="75" cy="38" r="2"/>
  
  <!-- 鸟嘴 -->
  <polygon class="bird-beak" points="80,40 90,38 80,46"/>
  
  <!-- 尾巴 -->
  <path d="M 25 50 Q 15 45 20 60 Q 18 55 25 55" fill="#FF8A80" stroke="#D32F2F" stroke-width="1.5"/>
  
  <!-- 腿 -->
  <path class="bird-leg" d="M 45 70 L 45 85" />
  <path class="bird-leg" d="M 55 70 L 55 85" />
  
  <!-- 脚趾 -->
  <path d="M 45 85 L 40 88" fill="none" stroke="#795548" stroke-width="1.5"/>
  <path d="M 45 85 L 45 90" fill="none" stroke="#795548" stroke-width="1.5"/>
  <path d="M 45 85 L 50 88" fill="none" stroke="#795548" stroke-width="1.5"/>
  
  <path d="M 55 85 L 50 88" fill="none" stroke="#795548" stroke-width="1.5"/>
  <path d="M 55 85 L 55 90" fill="none" stroke="#795548" stroke-width="1.5"/>
  <path d="M 55 85 L 60 88" fill="none" stroke="#795548" stroke-width="1.5"/>
  
  <!-- 装饰云朵 -->
  <circle cx="20" cy="30" r="8" fill="#E3F2FD" opacity="0.7"/>
  <circle cx="25" cy="25" r="6" fill="#E3F2FD" opacity="0.7"/>
  <circle cx="30" cy="30" r="7" fill="#E3F2FD" opacity="0.7"/>
  
  <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#D32F2F">
    小鸟
  </text>
</svg>