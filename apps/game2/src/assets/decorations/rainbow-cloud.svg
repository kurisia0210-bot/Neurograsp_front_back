<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="400" height="300">
  <!-- 彩虹云朵 - 儿童友好的装饰性SVG -->
  <style>
    .cloud { fill: #FFFFFF; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); }
    .rainbow-red { fill: #FF6B6B; }
    .rainbow-orange { fill: #FFA726; }
    .rainbow-yellow { fill: #FFD54F; }
    .rainbow-green { fill: #81C784; }
    .rainbow-blue { fill: #64B5F6; }
    .rainbow-indigo { fill: #5C6BC0; }
    .rainbow-violet { fill: #9575CD; }
    .sun { fill: #FFD54F; }
    .sun-ray { fill: #FFD54F; opacity: 0.6; }
    
    /* 简单的动画效果 */
    .cloud {
      animation: float 3s ease-in-out infinite;
    }
    .sun {
      animation: rotate 20s linear infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  
  <!-- 背景 -->
  <rect width="200" height="150" fill="#87CEEB"/>
  
  <!-- 太阳 -->
  <g class="sun">
    <circle cx="180" cy="30" r="15"/>
    <!-- 太阳光芒 -->
    <rect x="175" y="10" width="10" height="10" class="sun-ray"/>
    <rect x="175" y="40" width="10" height="10" class="sun-ray"/>
    <rect x="160" y="25" width="10" height="10" class="sun-ray"/>
    <rect x="190" y="25" width="10" height="10" class="sun-ray"/>
    <rect x="170" y="15" width="10" height="10" transform="rotate(45 175 20)" class="sun-ray"/>
    <rect x="170" y="35" width="10" height="10" transform="rotate(45 175 40)" class="sun-ray"/>
    <rect x="160" y="15" width="10" height="10" transform="rotate(-45 165 20)" class="sun-ray"/>
    <rect x="160" y="35" width="10" height="10" transform="rotate(-45 165 40)" class="sun-ray"/>
  </g>
  
  <!-- 彩虹 -->
  <g transform="translate(0, 20)">
    <path class="rainbow-red" d="M 0 80 Q 100 0 200 80" fill="none" stroke-width="12"/>
    <path class="rainbow-orange" d="M 5 82 Q 100 5 195 82" fill="none" stroke-width="12"/>
    <path class="rainbow-yellow" d="M 10 84 Q 100 10 190 84" fill="none" stroke-width="12"/>
    <path class="rainbow-green" d="M 15 86 Q 100 15 185 86" fill="none" stroke-width="12"/>
    <path class="rainbow-blue" d="M 20 88 Q 100 20 180 88" fill="none" stroke-width="12"/>
    <path class="rainbow-indigo" d="M 25 90 Q 100 25 175 90" fill="none" stroke-width="12"/>
    <path class="rainbow-violet" d="M 30 92 Q 100 30 170 92" fill="none" stroke-width="12"/>
  </g>
  
  <!-- 云朵 -->
  <g class="cloud" transform="translate(30, 40)">
    <ellipse cx="40" cy="20" rx="30" ry="20"/>
    <ellipse cx="70" cy="15" rx="25" ry="18"/>
    <ellipse cx="100" cy="20" rx="30" ry="20"/>
    <ellipse cx="60" cy="30" rx="35" ry="15"/>
  </g>
  
  <g class="cloud" transform="translate(120, 60)" style="animation-delay: 1s;">
    <ellipse cx="30" cy="15" rx="25" ry="15"/>
    <ellipse cx="55" cy="10" rx="20" ry="12"/>
    <ellipse cx="80" cy="15" rx="25" ry="15"/>
    <ellipse cx="50" cy="25" rx="30" ry="12"/>
  </g>
  
  <!-- 草地 -->
  <rect x="0" y="110" width="200" height="40" fill="#7CB342"/>
  
  <!-- 草叶 -->
  <g fill="#558B2F">
    <path d="M 10 110 Q 15 90 20 110"/>
    <path d="M 30 110 Q 35 85 40 110"/>
    <path d="M 50 110 Q 55 95 60 110"/>
    <path d="M 70 110 Q 75 88 80 110"/>
    <path d="M 90 110 Q 95 92 100 110"/>
    <path d="M 110 110 Q 115 87 120 110"/>
    <path d="M 130 110 Q 135 93 140 110"/>
    <path d="M 150 110 Q 155 89 160 110"/>
    <path d="M 170 110 Q 175 91 180 110"/>
    <path d="M 190 110 Q 195 86 200 110"/>
  </g>
  
  <!-- 花朵 -->
  <g transform="translate(40, 100)">
    <circle cx="0" cy="0" r="5" fill="#FF6B6B"/>
    <circle cx="5" cy="-5" r="3" fill="#FF6B6B"/>
    <circle cx="5" cy="5" r="3" fill="#FF6B6B"/>
    <circle cx="0" cy="7" r="3" fill="#FF6B6B"/>
    <circle cx="-5" cy="5" r="3" fill="#FF6B6B"/>
    <circle cx="-5" cy="-5" r="3" fill="#FF6B6B"/>
    <circle cx="0" cy="-7" r="3" fill="#FF6B6B"/>
    <circle cx="7" cy="0" r="3" fill="#FF6B6B"/>
    <circle cx="-7" cy="0" r="3" fill="#FF6B6B"/>
    <circle cx="0" cy="0" r="2" fill="#FFD54F"/>
  </g>
  
  <g transform="translate(160, 105)">
    <circle cx="0" cy="0" r="4" fill="#64B5F6"/>
    <circle cx="4" cy="-4" r="2.5" fill="#64B5F6"/>
    <circle cx="4" cy="4" r="2.5" fill="#64B5F6"/>
    <circle cx="0" cy="5" r="2.5" fill="#64B5F6"/>
    <circle cx="-4" cy="4" r="2.5" fill="#64B5F6"/>
    <circle cx="-4" cy="-4" r="2.5" fill="#64B5F6"/>
    <circle cx="0" cy="-5" r="2.5" fill="#64B5F6"/>
    <circle cx="5" cy="0" r="2.5" fill="#64B5F6"/>
    <circle cx="-5" cy="0" r="2.5" fill="#64B5F6"/>
    <circle cx="0" cy="0" r="1.5" fill="#FFFFFF"/>
  </g>
  
  <text x="100" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
    彩虹云朵
  </text>
</svg>