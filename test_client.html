<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connection Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #333; color: white; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; border: none; color: white; }
        #log { margin-top: 20px; padding: 10px; background: #000; border: 1px solid #555; font-family: monospace; white-space: pre-wrap; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>
    <h1>🔌 Frontend-Backend Link Test</h1>
    <p>Target: <code>http://127.0.0.1:8000/api/ping</code></p>
    <button onclick="testConnection()">🚀 Send Test Request</button>
    
    <div id="log">Logs will appear here...</div>

    <script>
        async function testConnection() {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = "⏳ Sending request...";

            // 构造符合后端 Schema 的数据
            const payload = {
                msg: "Hello from HTML",
                count: 100
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/api/ping', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const text = await response.text();
                
                if (response.ok) {
                    const json = JSON.parse(text);
                    logDiv.innerHTML = `<span class="success">✅ SUCCESS (200 OK)</span>\n\nServer Said: ${JSON.stringify(json, null, 2)}`;
                } else {
                    logDiv.innerHTML = `<span class="error">❌ FAILED (${response.status})</span>\n\nServer Error Details:\n${text}`;
                }

            } catch (error) {
                logDiv.innerHTML = `<span class="error">💥 NETWORK ERROR</span>\n\nIs the server running?\nDetails: ${error.message}`;
            }
        }
    </script>
</body>
</html>
